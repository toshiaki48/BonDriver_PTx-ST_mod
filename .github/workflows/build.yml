name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Force UTF8 with BOM
        # 全てのソースとリソースファイルを BOM付きUTF-8 に変換
        run: |
          $files = Get-ChildItem -Recurse -Include *.cpp, *.h, *.rc
          foreach ($file in $files) {
            $content = Get-Content $file.FullName -Raw
            [System.IO.File]::WriteAllText($file.FullName, $content, [System.Text.Encoding]::UTF8)
          }
        shell: powershell

      - name: Build Win32
        run: msbuild BonDriver_PTx.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
      - name: Build x64
        run: msbuild BonDriver_PTx.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BonDriver_PTx-ST_mod_Fixed_Encoding
          path: |
            **/*.dll
            **/*.exe
            
