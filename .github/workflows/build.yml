name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
      - name: Add msbuild to PATH
        uses: microsoft/setup-msbuild@v2
      - name: Build Win32
        # WindowsTargetPlatformVersion=10.0 を追加して、古いSDKエラーを回避します
        run: msbuild BonDriver_PTx.sln /p:Configuration=Release /p:Platform=Win32 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
      - name: Build x64
        run: msbuild BonDriver_PTx.sln /p:Configuration=Release /p:Platform=x64 /p:PlatformToolset=v143 /p:WindowsTargetPlatformVersion=10.0
      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: BonDriver_PTx-ST_mod_Binaries
          path: |
            **/Release/BonDriver_PTx.dll
            **/Release/PTxCtrl.exe
            **/Release/PTxScanS.exe
            
